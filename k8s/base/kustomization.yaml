apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: devops-project

resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml

secretGenerator:
  - name: app-secrets
    envs:
      - secret.env

generatorOptions:
  disableNameSuffixHash: true

commonLabels:
  app.kubernetes.io/managed-by: kustomize
