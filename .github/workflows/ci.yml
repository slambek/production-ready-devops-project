name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test and lint Python application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            app/requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run lint checks
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Run tests
        run: |
          python -m pytest -v

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs:
      - test
      - helm
      - security

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  helm:
    name: Validate Helm chart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Lint Helm chart
        run: |
          helm lint \
            helm/production-ready-devops-project \
            -f helm/production-ready-devops-project/values.ci.yaml \
            --strict

      - name: Render Kubernetes manifests
        run: |
          helm template devops \
            helm/production-ready-devops-project \
            --namespace devops-ci \
            -f helm/production-ready-devops-project/values.ci.yaml \
            > /tmp/devops-manifests.yaml

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.7.0/kubeconform-linux-amd64.tar.gz

          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

          kubeconform -v

      - name: Validate Kubernetes schemas
        run: |
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.35.1 \
            /tmp/devops-manifests.yaml

      - name: Verify rendered manifests
        run: |
          test -s /tmp/devops-manifests.yaml
          grep -q "kind: Deployment" /tmp/devops-manifests.yaml
          grep -q "kind: Service" /tmp/devops-manifests.yaml
          grep -q "kind: Ingress" /tmp/devops-manifests.yaml
          grep -q "kind: HorizontalPodAutoscaler" /tmp/devops-manifests.yaml
          grep -q "kind: PodDisruptionBudget" /tmp/devops-manifests.yaml
          grep -q "kind: NetworkPolicy" /tmp/devops-manifests.yaml

  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs:
      - test
      - helm

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build image for security scan
        run: |
          docker build \
            --tag production-ready-devops-project:security-scan \
            .

      - name: Scan repository
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Docker image
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: production-ready-devops-project:security-scan
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1
