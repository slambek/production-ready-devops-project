services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      APP_ENV: development
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s