apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-project.fullname" . }}-app
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  replicas: {{ .Values.app.replicaCount }}
  selector:
    matchLabels:
      {{- include "devops-project.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "devops-project.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-project.fullname" . }}-config
                  key: APP_ENV

            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-project.fullname" . }}-config
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-project.fullname" . }}-config
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-project.fullname" . }}-secret
                  key: POSTGRES_PASSWORD

            - name: DATABASE_URL
              value: {{ printf "postgresql+psycopg2://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@%s-postgres:5432/$(POSTGRES_DB)" (include "devops-project.fullname" .) | quote }}

          readinessProbe:
            httpGet:
              path: {{ .Values.app.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.readiness.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: {{ .Values.app.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.app.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.app.probes.liveness.periodSeconds }}
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-project.fullname" . }}-app
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  type: {{ .Values.app.service.type }}
  selector:
    {{- include "devops-project.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: app
  ports:
    - name: http
      port: {{ .Values.app.service.port }}
      targetPort: http
      protocol: TCP
