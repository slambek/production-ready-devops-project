{{- if .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "devops-project.fullname" . }}-postgres
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
---
{{- end }}

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "devops-project.fullname" . }}-postgres
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1

  selector:
    matchLabels:
      {{- include "devops-project.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres

  strategy:
    type: Recreate

  template:
    metadata:
      labels:
        {{- include "devops-project.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: postgres

    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP

          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-project.fullname" . }}-config
                  key: POSTGRES_DB

            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "devops-project.fullname" . }}-config
                  key: POSTGRES_USER

            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "devops-project.fullname" . }}-secret
                  key: POSTGRES_PASSWORD

            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          volumeMounts:
            {{- if .Values.postgres.persistence.enabled }}
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            {{- end }}

            - name: postgres-runtime
              mountPath: /var/run/postgresql

            - name: postgres-tmp
              mountPath: /tmp

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}

      volumes:
        {{- if .Values.postgres.persistence.enabled }}
        - name: postgres-data
          persistentVolumeClaim:
            claimName: {{ include "devops-project.fullname" . }}-postgres
        {{- end }}

        - name: postgres-runtime
          emptyDir: {}

        - name: postgres-tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "devops-project.fullname" . }}-postgres
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP

  selector:
    {{- include "devops-project.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: postgres

  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
