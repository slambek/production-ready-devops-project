{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "devops-project.fullname" . }}-postgres-ingress
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "devops-project.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: postgres

  policyTypes:
    - Ingress

  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "devops-project.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: app
      ports:
        - protocol: TCP
          port: 5432

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "devops-project.fullname" . }}-app-ingress
  labels:
    {{- include "devops-project.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "devops-project.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: app

  policyTypes:
    - Ingress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8000
{{- end }}
