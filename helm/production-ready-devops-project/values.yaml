nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/slambek/production-ready-devops-project
  tag: latest
  pullPolicy: IfNotPresent

app:
  environment: production
  replicaCount: 2

  service:
    type: ClusterIP
    port: 8000

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  probes:
    readiness:
      path: /ready
      initialDelaySeconds: 5
      periodSeconds: 5
    liveness:
      path: /health
      initialDelaySeconds: 15
      periodSeconds: 10

postgres:
  image:
    repository: postgres
    tag: 17-alpine
    pullPolicy: IfNotPresent

  database: devops_db
  username: devops_user
  password: change_me

  persistence:
    enabled: true
    size: 1Gi

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  enabled: true
  className: nginx
  host: devops-project.local

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 50

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
