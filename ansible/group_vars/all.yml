project_name: production-ready-devops-project
deploy_user: deploy
deploy_group: deploy

deploy_root: /opt/production-ready-devops-project
deploy_directory: "{{ deploy_root }}/deploy"
monitoring_directory: "{{ deploy_root }}/monitoring"
