---
- name: Create Docker keyring directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker repository signing key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Determine Docker repository architecture
  ansible.builtin.set_fact:
    docker_repository_architecture: >-
      {{
        {
          'x86_64': 'amd64',
          'aarch64': 'arm64',
          'armv7l': 'armhf'
        }.get(ansible_facts['architecture'], ansible_facts['architecture'])
      }}

- name: Add Docker apt repository
  ansible.builtin.deb822_repository:
    name: docker
    types:
      - deb
    uris:
      - https://download.docker.com/linux/ubuntu
    suites:
      - "{{ ansible_facts['distribution_release'] }}"
    components:
      - stable
    architectures:
      - "{{ docker_repository_architecture }}"
    signed_by: /etc/apt/keyrings/docker.asc
    state: present

- name: Update apt cache after adding Docker repository
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present

- name: Enable and start Docker
  ansible.builtin.service:
    name: docker
    enabled: true
    state: started

- name: Add deployment user to Docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups:
      - docker
    append: true
