---
- name: Create project directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"
  loop:
    - "{{ deploy_root }}"
    - "{{ deploy_directory }}"
    - "{{ monitoring_directory }}"
    - "{{ nginx_directory }}"

- name: Copy production Compose file
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../deploy/docker-compose.prod.yml"
    dest: "{{ deploy_directory }}/docker-compose.prod.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Copy deployment script
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../deploy/deploy.sh"
    dest: "{{ deploy_directory }}/deploy.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Copy Nginx configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../docker/nginx/nginx.conf"
    dest: "{{ nginx_directory }}/nginx.conf"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"

- name: Copy monitoring configuration
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../monitoring/"
    dest: "{{ monitoring_directory }}/"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"
