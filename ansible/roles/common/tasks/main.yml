---
- name: Update apt package cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - gnupg
      - python3
      - python3-pip
    state: present

- name: Create deployment group
  ansible.builtin.group:
    name: "{{ deploy_group }}"
    state: present

- name: Create deployment user
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    create_home: true
    shell: /bin/bash
    state: present
